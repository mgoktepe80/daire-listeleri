<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ==========================================
        // FIREBASE YAPILANDIRMASI
        // ==========================================
        // ⚠️ ÖNEMLİ: Aşağıdaki bilgileri kendi Firebase projenizden alın!
        // Firebase Console → Project Settings → Your apps → Firebase SDK snippet
        
        /* 
        ==========================================
        🔐 FİREBASE GÜVENLİK KURALLARI (FIRESTORE)
        ==========================================
        Firebase Console → Firestore Database → Rules sekmesine aşağıdaki kuralları yapıştırın:
        
        rules_version = '2';
        service cloud.firestore {
          match /databases/{database}/documents {
            // Kullanıcı kimlik doğrulaması kontrolü
            function isSignedIn() {
              return request.auth != null;
            }
            
            // Kullanıcı kendi verisine erişiyor mu?
            function isOwner(userId) {
              return request.auth.uid == userId;
            }
            
            // Kullanıcı verisi - sadece kendi verisine erişebilir
            match /users/{userId} {
              allow read, write: if isSignedIn() && isOwner(userId);
            }
            
            // Kullanıcı ayarları (tema vb.) - sadece kendi ayarlarına erişebilir
            match /userSettings/{userId} {
              allow read, write: if isSignedIn() && isOwner(userId);
            }
            
            // Diğer tüm erişimler reddedilir
            match /{document=**} {
              allow read, write: if false;
            }
          }
        }
        
        ==========================================
        Bu kurallar:
        ✅ Kullanıcılar sadece kendi verilerine erişebilir
        ✅ Giriş yapmadan veri okunamaz/yazılamaz
        ✅ Kalıcı güvenlik (süre sınırı yok)
        ✅ Production-ready
        ==========================================
        */
        
        const firebaseConfig = {
            apiKey: "AIzaSyArx5M6zeXeAqYToThIIDwC3YNi8iWmd3Q",
            authDomain: "malzeme-takip-6e4d5.firebaseapp.com",
            projectId: "malzeme-takip-6e4d5",
            storageBucket: "malzeme-takip-6e4d5.firebasestorage.app",
            messagingSenderId: "473422973374",
            appId: "1:473422973374:web:f05b4573c9fcac19a511ef"
        };

        // Firebase'i başlat
        let db = null;
        let auth = null;
        let storage = null;
        let firebaseEnabled = false;
        
        try {
            // Firebase SDK yüklü mü kontrol et
            if (typeof firebase === 'undefined') {
                console.log('⚠️ Firebase SDK yüklenemedi - sadece localStorage kullanılıyor');
            } else if (firebaseConfig.apiKey !== "BURAYA_KENDI_API_KEY") {
                // Firebase'i başlat
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                auth = firebase.auth();
                storage = firebase.storage();
                firebaseEnabled = true;
                console.log('✅ Firebase bağlantısı başarılı! (Firestore + Storage + Auth)');
            } else {
                console.log('⚠️ Firebase yapılandırması eksik - sadece localStorage kullanılıyor');
            }
        } catch (error) {
            console.error('❌ Firebase başlatma hatası:', error);
            console.log('⚠️ Sadece localStorage kullanılacak');
        }

        // ==========================================
        // FIREBASE STORAGE FONKSİYONLARI (FOTOĞRAFLAR İÇİN)
        // ==========================================
        
        // Fotoğrafı Firebase Storage'a yükle
        const uploadPhotoToStorage = async (base64Data, userId, projectId, apartmentId, roomId, photoIndex) => {
            if (!storage || !auth || !auth.currentUser) {
                console.log('⚠️ Storage kullanılamıyor, base64 olarak kaydediliyor');
                return base64Data; // Fallback: base64 olarak döndür
            }
            
            try {
                // Base64'ten blob'a çevir
                const response = await fetch(base64Data);
                const blob = await response.blob();
                
                // Dosya yolu: users/{userId}/photos/{projectId}/{apartmentId}/{roomId}/{photoIndex}.jpg
                const path = `users/${userId}/photos/${projectId}/${apartmentId}/${roomId}/${photoIndex}.jpg`;
                const storageRef = storage.ref(path);
                
                // Yükle
                await storageRef.put(blob, {
                    contentType: 'image/jpeg',
                    cacheControl: 'public, max-age=31536000'
                });
                
                // URL'yi al
                const downloadURL = await storageRef.getDownloadURL();
                console.log('✅ Fotoğraf Storage\'a yüklendi:', path);
                return downloadURL;
            } catch (error) {
                console.error('❌ Storage yükleme hatası:', error);
                return base64Data; // Hata durumunda base64 kullan
            }
        };
        
        // İcon'u Firebase Storage'a yükle
        const uploadIconToStorage = async (base64Data, userId, iconType, iconId) => {
            if (!storage || !auth || !auth.currentUser) {
                console.log('⚠️ Storage kullanılamıyor, base64 olarak kaydediliyor');
                return base64Data; // Fallback: base64 olarak döndür
            }
            
            try {
                // Base64'ten blob'a çevir
                const response = await fetch(base64Data);
                const blob = await response.blob();
                
                // Dosya uzantısını belirle
                const mimeType = blob.type;
                const extension = mimeType.split('/')[1] || 'jpg';
                
                // Dosya yolu: users/{userId}/icons/{iconType}/{iconId}.{extension}
                // iconType: "room" veya "field"
                const timestamp = Date.now();
                const path = `users/${userId}/icons/${iconType}/${iconId}_${timestamp}.${extension}`;
                const storageRef = storage.ref(path);
                
                // Yükle
                await storageRef.put(blob, {
                    contentType: mimeType,
                    cacheControl: 'public, max-age=31536000'
                });
                
                // URL'yi al
                const downloadURL = await storageRef.getDownloadURL();
                console.log('✅ İcon Storage\'a yüklendi:', path);
                return downloadURL;
            } catch (error) {
                console.error('❌ Icon storage yükleme hatası:', error);
                return base64Data; // Hata durumunda base64 kullan
            }
        };
        
        // Storage'dan fotoğrafı sil
        const deletePhotoFromStorage = async (photoURL) => {
            if (!storage || !photoURL || !photoURL.includes('firebasestorage')) {
                return; // Storage URL'i değilse silme
            }
            
            try {
                const storageRef = storage.refFromURL(photoURL);
                await storageRef.delete();
                console.log('✅ Fotoğraf Storage\'dan silindi');
            } catch (error) {
                console.error('❌ Storage silme hatası:', error);
            }
        };
        
        // Fotoğrafı sıkıştır (agresif sıkıştırma - Firestore 1MB limiti için)
        const compressImage = async (base64Data, maxWidth = 800, quality = 0.5) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    
                    // Boyutu küçült (800px max)
                    if (width > maxWidth) {
                        height = (height * maxWidth) / width;
                        width = maxWidth;
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Agresif sıkıştırma (%50 kalite)
                    const compressed = canvas.toDataURL('image/jpeg', quality);
                    
                    const originalSize = (base64Data.length / 1024).toFixed(0);
                    const compressedSize = (compressed.length / 1024).toFixed(0);
                    console.log(`🗜️ Sıkıştırma: ${originalSize}KB → ${compressedSize}KB (%${Math.round((1 - compressed.length / base64Data.length) * 100)} azalma)`);
                    
                    resolve(compressed);
                };
                img.src = base64Data;
            });
        };

        // ==========================================
        // ARŞİVLEME FONKSİYONLARI
        // ==========================================
        
        // Projeyi arşivle (Firebase Storage'a kaydet)
        const archiveProject = async (project) => {
            if (!storage || !auth || !auth.currentUser) {
                alert('⚠️ Arşivleme için Firebase\'e giriş yapmanız gerekiyor!');
                return false;
            }
            
            try {
                const userId = auth.currentUser.uid;
                const timestamp = Date.now();
                const fileName = `${project.name.replace(/[^a-zA-Z0-9]/g, '_')}_${timestamp}.json`;
                const path = `users/${userId}/archives/${fileName}`;
                
                // Arşiv verisi
                const archiveData = {
                    project: project,
                    archivedAt: timestamp,
                    archivedBy: auth.currentUser.email,
                    version: '1.0'
                };
                
                // JSON'a çevir ve blob oluştur
                const jsonBlob = new Blob([JSON.stringify(archiveData, null, 2)], { type: 'application/json' });
                
                // Storage'a yükle
                const storageRef = storage.ref(path);
                await storageRef.put(jsonBlob, {
                    contentType: 'application/json',
                    customMetadata: {
                        projectName: project.name,
                        projectId: project.id.toString(),
                        apartmentCount: project.apartments.length.toString(),
                        archivedAt: new Date(timestamp).toISOString()
                    }
                });
                
                console.log('✅ Proje arşivlendi:', path);
                return true;
            } catch (error) {
                console.error('❌ Arşivleme hatası:', error);
                alert('❌ Arşivleme başarısız: ' + error.message);
                return false;
            }
        };
        
        // Arşivlenmiş projeleri listele
        const loadArchivedProjects = async () => {
            if (!storage || !auth || !auth.currentUser) {
                return [];
            }
            
            try {
                setLoadingArchives(true);
                const userId = auth.currentUser.uid;
                const archivesRef = storage.ref(`users/${userId}/archives`);
                
                // Tüm arşiv dosyalarını listele
                const result = await archivesRef.listAll();
                
                // Her dosya için metadata al
                const archives = await Promise.all(
                    result.items.map(async (item) => {
                        const metadata = await item.getMetadata();
                        const downloadURL = await item.getDownloadURL();
                        
                        return {
                            name: item.name,
                            path: item.fullPath,
                            downloadURL: downloadURL,
                            projectName: metadata.customMetadata?.projectName || 'Bilinmeyen Proje',
                            projectId: metadata.customMetadata?.projectId,
                            apartmentCount: metadata.customMetadata?.apartmentCount || '0',
                            archivedAt: metadata.customMetadata?.archivedAt || metadata.timeCreated,
                            size: (metadata.size / 1024).toFixed(2) + ' KB'
                        };
                    })
                );
                
                // Tarihe göre sırala (en yeni önce)
                archives.sort((a, b) => new Date(b.archivedAt) - new Date(a.archivedAt));
                
                setArchivedProjects(archives);
                setLoadingArchives(false);
                return archives;
            } catch (error) {
                console.error('❌ Arşiv yükleme hatası:', error);
                setLoadingArchives(false);
                return [];
            }
        };
        
        // Arşivden projeyi geri yükle
        const restoreProject = async (archive) => {
            try {
                // JSON dosyasını indir
                const response = await fetch(archive.downloadURL);
                const archiveData = await response.json();
                
                if (!archiveData.project) {
                    alert('❌ Geçersiz arşiv dosyası!');
                    return false;
                }
                
                const restoredProject = archiveData.project;
                
                // Yeni ID ata (çakışmayı önlemek için)
                const newId = Math.max(...projects.map(p => p.id), 0) + 1;
                restoredProject.id = newId;
                restoredProject.name = restoredProject.name + ' (Geri Yüklendi)';
                
                // Projeyi ekle
                const updatedProjects = [...projects, restoredProject];
                updateProjects(updatedProjects);
                setCurrentPrj(newId);
                
                if (restoredProject.apartments[0]) {
                    setCurrentApt(restoredProject.apartments[0].id);
                }
                
                alert(`✅ "${restoredProject.name}" başarıyla geri yüklendi!`);
                setShowArchiveModal(false);
                return true;
            } catch (error) {
                console.error('❌ Geri yükleme hatası:', error);
                alert('❌ Geri yükleme başarısız: ' + error.message);
                return false;
            }
        };
        
        // Arşivi local'e indir (JSON dosyası olarak)
        const downloadArchive = async (archive) => {
            try {
                const response = await fetch(archive.downloadURL);
                const archiveData = await response.json();
                
                // JSON dosyası oluştur ve indir
                const blob = new Blob([JSON.stringify(archiveData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = archive.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                alert('✅ Arşiv indirildi!');
            } catch (error) {
                console.error('❌ İndirme hatası:', error);
                alert('❌ İndirme başarısız: ' + error.message);
            }
        };
        
        // Arşivi sil
        const deleteArchive = async (archive) => {
            if (!storage) return false;
            
            if (!confirm(`"${archive.projectName}" arşivini kalıcı olarak silmek istediğinize emin misiniz?`)) {
                return false;
            }
            
            try {
                const storageRef = storage.ref(archive.path);
                await storageRef.delete();
                
                // Listeyi güncelle
                setArchivedProjects(archivedProjects.filter(a => a.path !== archive.path));
                
                alert('✅ Arşiv silindi!');
                return true;
            } catch (error) {
                console.error('❌ Arşiv silme hatası:', error);
                alert('❌ Silme başarısız: ' + error.message);
                return false;
            }
        };

        // ==========================================
        // AUTHENTICATION FONKSİYONLARI
        // ==========================================
        
        // Kullanıcı girişi
        const signIn = async (email, password) => {
            if (!auth) return { success: false, error: 'Firebase yapılandırılmamış' };
            try {
                await auth.signInWithEmailAndPassword(email, password);
                return { success: true };
            } catch (error) {
                let errorMsg = 'Giriş başarısız';
                if (error.code === 'auth/wrong-password') errorMsg = 'Şifre yanlış';
                else if (error.code === 'auth/user-not-found') errorMsg = 'Kullanıcı bulunamadı';
                else if (error.code === 'auth/invalid-email') errorMsg = 'Geçersiz email';
                return { success: false, error: errorMsg };
            }
        };

        // Kullanıcı kaydı
        const signUp = async (email, password) => {
            if (!auth) return { success: false, error: 'Firebase yapılandırılmamış' };
            try {
                await auth.createUserWithEmailAndPassword(email, password);
                return { success: true };
            } catch (error) {
                let errorMsg = 'Kayıt başarısız';
                if (error.code === 'auth/email-already-in-use') errorMsg = 'Bu email zaten kullanımda';
                else if (error.code === 'auth/weak-password') errorMsg = 'Şifre en az 6 karakter olmalı';
                else if (error.code === 'auth/invalid-email') errorMsg = 'Geçersiz email';
                return { success: false, error: errorMsg };
            }
        };

        // Çıkış yap
        const signOut = async () => {
            if (!auth) return;
            try {
                await auth.signOut();
            } catch (error) {
                console.error('Çıkış hatası:', error);
            }
        };

        // Şifremi unuttum
        const resetPassword = async (email) => {
            if (!auth) return { success: false, error: 'Firebase yapılandırılmamış' };
            try {
                await auth.sendPasswordResetEmail(email);
                return { success: true };
            } catch (error) {
                let errorMsg = 'Şifre sıfırlama başarısız';
                if (error.code === 'auth/user-not-found') errorMsg = 'Bu email kayıtlı değil';
                else if (error.code === 'auth/invalid-email') errorMsg = 'Geçersiz email';
                return { success: false, error: errorMsg };
            }
        };

        // ==========================================
        // OTURUM YÖNETİMİ (Session Management)
        // ==========================================
        
        // Mevcut oturum ID'sini oluştur
        const generateSessionId = () => {
            return `${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
        };
        
        let currentSessionId = generateSessionId();
        
        // Aktif oturum bilgisini Firebase'e kaydet
        const updateSessionInfo = async (user) => {
            if (!firebaseEnabled || !db || !user) return;
            
            try {
                // activeSessions'a kaydet
                await db.collection('activeSessions').doc(user.uid).set({
                    sessionId: currentSessionId,
                    email: user.email,
                    userEmail: user.email, // Admin için ekstra
                    lastActive: firebase.firestore.FieldValue.serverTimestamp(),
                    userAgent: navigator.userAgent,
                    platform: navigator.platform
                });
                
                // userSettings'e de email'i kaydet (admin için)
                await db.collection('userSettings').doc(user.uid).set({
                    email: user.email
                }, { merge: true }); // merge: mevcut ayarları korur
                
                console.log('📝 Oturum bilgisi güncellendi:', currentSessionId);
            } catch (error) {
                console.error('❌ Oturum bilgisi güncelleme hatası:', error);
            }
        };
        
        // Başka bir cihazdan oturum açıldığını kontrol et
        const checkSessionConflict = (callback) => {
            if (!firebaseEnabled || !db || !auth || !auth.currentUser) return null;
            
            return db.collection('activeSessions').doc(auth.currentUser.uid).onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.sessionId && data.sessionId !== currentSessionId) {
                        console.log('⚠️ Başka bir cihazdan oturum açıldı!');
                        callback(data);
                    }
                }
            }, (error) => {
                console.error('❌ Oturum kontrolü hatası:', error);
            });
        };

        // ==========================================
        // FIREBASE SYNC FONKSİYONLARI
        // ==========================================
        
        // Verileri Firebase'e kaydet
        // Icon'ları Storage'a migrate et (base64 → Firebase Storage URL)
        const migrateIconsToStorage = async (data) => {
            if (!storage || !auth || !auth.currentUser) {
                console.log('⚠️ Storage kullanılamıyor, migration atlanıyor');
                return data;
            }
            
            const userId = auth.currentUser.uid;
            let hasChanges = false;
            const migratedData = { ...data };
            
            try {
                // 1. fieldLabels'daki icon'ları migrate et
                if (migratedData.fieldLabels) {
                    console.log('📦 Field icon\'ları kontrol ediliyor...');
                    const newFieldLabels = { ...migratedData.fieldLabels };
                    
                    for (const [fieldKey, fieldConfig] of Object.entries(newFieldLabels)) {
                        if (fieldConfig.icon && fieldConfig.icon.startsWith('data:image')) {
                            console.log(`📤 ${fieldKey} icon'u Storage'a yükleniyor...`);
                            const storageURL = await uploadIconToStorage(fieldConfig.icon, userId, 'field', fieldKey);
                            if (storageURL && !storageURL.startsWith('data:')) {
                                newFieldLabels[fieldKey] = { ...fieldConfig, icon: storageURL };
                                hasChanges = true;
                                console.log(`✅ ${fieldKey} icon'u migrate edildi`);
                            }
                        }
                    }
                    
                    if (hasChanges) {
                        migratedData.fieldLabels = newFieldLabels;
                    }
                }
                
                // 2. customRooms'daki icon'ları migrate et
                if (migratedData.customRooms && Array.isArray(migratedData.customRooms)) {
                    console.log('📦 Custom room icon\'ları kontrol ediliyor...');
                    const newCustomRooms = [...migratedData.customRooms];
                    
                    for (let i = 0; i < newCustomRooms.length; i++) {
                        const room = newCustomRooms[i];
                        if (room.customIcon && room.customIcon.startsWith('data:image')) {
                            console.log(`📤 ${room.name} icon'u Storage'a yükleniyor...`);
                            const storageURL = await uploadIconToStorage(room.customIcon, userId, 'room', room.id);
                            if (storageURL && !storageURL.startsWith('data:')) {
                                newCustomRooms[i] = { ...room, customIcon: storageURL };
                                hasChanges = true;
                                console.log(`✅ ${room.name} icon'u migrate edildi`);
                            }
                        }
                    }
                    
                    if (hasChanges) {
                        migratedData.customRooms = newCustomRooms;
                    }
                }
                
                // 3. baseRooms'daki icon'ları migrate et
                if (migratedData.baseRooms && Array.isArray(migratedData.baseRooms)) {
                    console.log('📦 Base room icon\'ları kontrol ediliyor...');
                    const newBaseRooms = [...migratedData.baseRooms];
                    
                    for (let i = 0; i < newBaseRooms.length; i++) {
                        const room = newBaseRooms[i];
                        if (room.customIcon && room.customIcon.startsWith('data:image')) {
                            console.log(`📤 ${room.name} icon'u Storage'a yükleniyor...`);
                            const storageURL = await uploadIconToStorage(room.customIcon, userId, 'room', room.id);
                            if (storageURL && !storageURL.startsWith('data:')) {
                                newBaseRooms[i] = { ...room, customIcon: storageURL };
                                hasChanges = true;
                                console.log(`✅ ${room.name} icon'u migrate edildi`);
                            }
                        }
                    }
                    
                    if (hasChanges) {
                        migratedData.baseRooms = newBaseRooms;
                    }
                }
                
                if (hasChanges) {
                    console.log('✅ Icon migration tamamlandı!');
                } else {
                    console.log('ℹ️ Migration gerektiren icon yok');
                }
                
                return migratedData;
            } catch (error) {
                console.error('❌ Icon migration hatası:', error);
                return data; // Hata olursa orijinal veriyi döndür
            }
        };

        const saveToFirebase = async (data) => {
            if (!firebaseEnabled || !db || !auth || !auth.currentUser) return false;
            
            try {
                const userId = auth.currentUser.uid;
                
                // Icon'ları Storage'a migrate et
                const migratedData = await migrateIconsToStorage(data);
                
                await db.collection('appData').doc(userId).set({
                    ...migratedData,
                    lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
                });
                console.log('✅ Firebase\'e kaydedildi (Kullanıcı:', userId.substring(0, 8) + '...)');
                return true;
            } catch (error) {
                console.error('❌ Firebase kayıt hatası:', error);
                return false;
            }
        };

            return rooms.map(room => ({

                editable: room.editable !== undefined ? room.editable : true,

                const categoryData = materials[category];
                
                // Zaten yeni formatta mı kontrol et

                migrated[category] = {
                    useSubGroup2: false, // Default pasif
                    subGroups: {}
                };
                
                if (typeof categoryData === 'object' && !Array.isArray(categoryData)) {
                    Object.keys(categoryData).forEach(subGroup => {
                        const items = categoryData[subGroup];
                        if (Array.isArray(items)) {
                            migrated[category].subGroups[subGroup] = { items };

        function LoginScreen() {
            const [mode, setMode] = useState('login'); // 'login', 'signup', 'reset'

            const [loading, setLoading] = useState(false);

                e.preventDefault();
                setError('');
                setSuccess('');
                setLoading(true);

                    const result = await signIn(email, password);
                    if (!result.success) {
                        setError(result.error);
                    }
                } else if (mode === 'signup') {
                    if (password.length < 6) {
                        setError('Şifre en az 6 karakter olmalı');
                        setLoading(false);
                        return;
                    }
                    const result = await signUp(email, password);
                    if (result.success) {
                        setSuccess('Hesap oluşturuldu! Giriş yapılıyor...');
                    } else {
                        setError(result.error);
                    }
                } else if (mode === 'reset') {
                    const result = await resetPassword(email);
                    if (result.success) {
                        setSuccess('Şifre sıfırlama linki email adresinize gönderildi!');
                        setTimeout(() => setMode('login'), 2000);
                    } else {
                        setError(result.error);
                    }
                }

                setLoading(false);
            };

                    const finalParts = parts.length >= 3 ? parts : line.split(/\s{2,}/).map(p => p.trim()).filter(p => p);

                            serie,
                            size,
                            name,

                            valid: true
                        });

                const categoryConfig = materials[category];
                const hasSubGroup2 = categoryConfig?.useSubGroup2 === true;
                const expectedColumns = hasSubGroup2 ? 3 : 2;
                
                const lines = text.split('\n').filter(line => line.trim());
                const parsed = [];
                
                lines.forEach((line, index) => {
                    // TAB veya çoklu boşluk ile ayrılmış değerleri parse et
                    const parts = line.split(/\t+/).map(p => p.trim()).filter(p => p);
                    
                    // Eğer TAB yoksa, 2+ boşlukla ayır
                    const finalParts = parts.length >= expectedColumns ? parts : line.split(/\s{2,}/).map(p => p.trim()).filter(p => p);
                    
                    if (hasSubGroup2) {
                        // 3 sütun bekleniyor: Alt Grup | Alt Grup 2 | Malzeme
                        if (finalParts.length >= 3) {
                            const subGroup = finalParts[0];
                            const subGroup2 = finalParts[1];
                            const material = finalParts.slice(2).join(' '); // Geri kalan tüm kısımlar malzeme adı
                            
                            parsed.push({
                                lineNumber: index + 1,
                                subGroup,
                                subGroup2,
                                material,
                                displayText: `${subGroup} → ${subGroup2} → ${material}`,
                                valid: true
                            });
                        } else {
                            parsed.push({
                                lineNumber: index + 1,

                    try {
                        await db.collection('userSettings').doc(user.uid).set({
                            theme: newTheme,
                            updatedAt: new Date().toISOString()
                        }, { merge: true });
                        console.log('✅ Tema tercihi Firebase\'e kaydedildi:', newTheme);
                    } catch (error) {
                        console.error('❌ Tema Firebase\'e kaydedilemedi:', error);
                    }
                }
                
                // Dropdown option'ları için global CSS güncelle
                const themeStyle = document.getElementById('theme-style');
                if (themeStyle) {
                    if (newTheme === 'dark') {
                        themeStyle.innerHTML = `
                            select option {
                                background-color: #374151 !important;
                                color: #f3f4f6 !important;
                            }
                        `;
                    } else {
                        themeStyle.innerHTML = `
                            select option {
                                background-color: white !important;
                                color: #111827 !important;
                            }
                        `;
                    }
                }
            };

            // Daire kopyalama fonksiyonu
            const copyApartment = () => {
                const sourceApt = getApt();
                const count = parseInt(copyCount) || 1;
                
                if (count < 1 || count > 50) {
                    alert('Lütfen 1-50 arası bir sayı girin!');
                    return;
                }
                
                // Kaynak daire isminden sayıyı çıkar
                const baseName = sourceApt.name.replace(/\s*\d+\s*$/, '').trim() || 'Daire';
                
                // Mevcut en büyük numarayı bul
                const existingNumbers = apartments
                    .map(a => {
                        const match = a.name.match(new RegExp(baseName + '\\s*(\\d+)'));
                        return match ? parseInt(match[1]) : 0;
                    })
                    .filter(n => n > 0);
                
                const maxNumber = existingNumbers.length > 0 ? Math.max(...existingNumbers) : 0;
                
                // Numaraları oluştur
                let numbers = [];
                
                // Başlangıç numarasını belirle
                let baseNumber = maxNumber;
                if (startNumber && startNumber.trim() !== '') {
                    const parsedStart = parseInt(startNumber);
                    if (!isNaN(parsedStart) && parsedStart > 0) {
                        baseNumber = parsedStart - 1; // Döngü +1 ile başlayacağı için -1
                    }
                }
                
                if (numberingMode === 'sequential') {
                    // Ardışık: 1, 2, 3, 4, 5...
                    for (let i = 0; i < count; i++) {
                        numbers.push(baseNumber + i + 1);
                    }
                } else if (numberingMode === 'odd') {
                    // Tek sayılar: 1, 3, 5, 7, 9...
                    let currentNumber = baseNumber % 2 === 0 ? baseNumber + 1 : baseNumber + 2;
                    for (let i = 0; i < count; i++) {
                        numbers.push(currentNumber);
                        currentNumber += 2;
                    }
                } else if (numberingMode === 'even') {
                    // Çift sayılar: 2, 4, 6, 8, 10...
                    let currentNumber = baseNumber % 2 === 1 ? baseNumber + 1 : baseNumber + 2;
                    for (let i = 0; i < count; i++) {
                        numbers.push(currentNumber);
                        currentNumber += 2;
                    }
                } else if (numberingMode === 'custom') {
                    // Özel numaralar
                    const customNumArray = customNumbers.split(',')
                        .map(n => parseInt(n.trim()))
                        .filter(n => !isNaN(n) && n > 0);
                    
                    if (customNumArray.length === 0) {
                        alert('Lütfen geçerli numaralar girin! (Örnek: 101, 102, 201, 202)');
                        return;
                    }
                    
                    numbers = customNumArray;
                }
                
                // Mevcut numaralarla çakışma kontrolü
                const conflicts = numbers.filter(num => existingNumbers.includes(num));
                if (conflicts.length > 0) {
                    if (!confirm(`⚠️ Aşağıdaki numaralar zaten mevcut:\n${conflicts.join(', ')}\n\nYine de devam edilsin mi? (Var olan daireler üzerine yazılacak!)`)) {
                        return;
                    }
                }
                
                const newApartments = [];
                let nextId = Math.max(...apartments.map(a => a.id), 0) + 1;
                
                // Belirlenen sayıda daire oluştur
                for (let i = 0; i < numbers.length; i++) {
                    const newNumber = numbers[i];
                    const newName = `${baseName} ${newNumber}`;
                    
                    const newData = {};
                    const newWallCount = {};
                    const newHiddenRooms = [...(sourceApt.hiddenRooms || [])];
                    
                    // Seçili mekanları kopyala
                    if (copyOptions.rooms) {
                        Object.keys(sourceApt.data).forEach(roomId => {
                            const roomData = sourceApt.data[roomId];
                            newData[roomId] = {};
                            
                            Object.keys(roomData).forEach(field => {
                                if (field === 'foto') {
                                    // Fotoğrafları sadece seçiliyse kopyala
                                    if (copyOptions.photos) {
                                        newData[roomId][field] = { ...roomData[field] };
                                    }
                                } else if (field === 'duvar_kaplama') {
                                    // Duvar kaplama - hem array hem obje olabilir
                                    if (Array.isArray(roomData[field])) {
                                        // Array formatı (yeni)
                                        const copiedWalls = roomData[field].map(wall => {
                                            const newWall = {};
                                            if (copyOptions.materials) {
                                                newWall.subgroup = wall.subgroup || '';
                                                newWall.malzeme = wall.malzeme || '';
                                            }
                                            if (copyOptions.amounts) {
                                                newWall.miktar = wall.miktar || '';
                                            }
                                            return newWall;
                                        });
                                        // Sadece dolu duvarları kopyala
                                        if (copiedWalls.some(w => w.subgroup || w.malzeme || w.miktar)) {
                                            newData[roomId][field] = copiedWalls;
                                        }
                                    } else if (typeof roomData[field] === 'object') {
                                        // Obje formatı (eski) - her key bir duvar indexi
                                        const copiedWalls = {};
                                        Object.keys(roomData[field]).forEach(wallIdx => {
                                            const wall = roomData[field][wallIdx];
                                            if (wall && typeof wall === 'object') {
                                                const newWall = {};
                                                if (copyOptions.materials) {
                                                    newWall.subgroup = wall.subgroup || '';
                                                    newWall.malzeme = wall.malzeme || '';
                                                }
                                                if (copyOptions.amounts) {
                                                    newWall.miktar = wall.miktar || '';
                                                }
                                                // Sadece dolu duvarları ekle
                                                if (newWall.subgroup || newWall.malzeme || newWall.miktar) {
                                                    copiedWalls[wallIdx] = newWall;
                                                }
                                            }
                                        });
                                        if (Object.keys(copiedWalls).length > 0) {
                                            newData[roomId][field] = copiedWalls;
                                        }
                                    }
                                } else if (roomData[field] && typeof roomData[field] === 'object') {
                                    // Diğer malzeme alanları - TÜM özellikleri kopyala
                                    const newField = { ...roomData[field] }; // Tüm field'ı kopyala
                                    
                                    // Eğer copyOptions seçili değilse, sadece ilgili alanları temizle
                                    if (!copyOptions.materials) {
                                        delete newField.subgroup;
                                        delete newField.malzeme;
                                    }
                                    if (!copyOptions.amounts) {
                                        delete newField.miktar;
                                    }
                                    
                                    // En az bir özellik varsa ekle
                                    if (Object.keys(newField).length > 0) {
                                        newData[roomId][field] = newField;
                                    }
                                }
                            });
                        });
                        
                        // Duvar sayılarını her zaman kopyala (mekanlar seçiliyse)
                        if (sourceApt.wallCount) {
                            Object.assign(newWallCount, sourceApt.wallCount);
                        }
                    }
                    
                    const newApartment = {
                        id: nextId++,
                        name: newName,
                        data: newData,
                        wallCount: newWallCount,
                        hiddenRooms: newHiddenRooms,
                        // customRooms'u da kopyala (migrate ederek)
                        customRooms: sourceApt.customRooms ? migrateRoomsData(JSON.parse(JSON.stringify(sourceApt.customRooms))) : undefined
                    };
                    
                    newApartments.push(newApartment);
                }
                
                console.log('📋 Kopyalama öncesi daire sayısı:', apartments.length);
                console.log('➕ Eklenecek yeni daireler:', newApartments.length);
                console.log('📋 Toplam daire sayısı olacak:', apartments.length + newApartments.length);
                
                updateApartments([...apartments, ...newApartments]);
                setCurrentApt(newApartments[0].id); // İlk oluşturulan daireye geç
                setShowCopyModal(false);
                
                // Kopyalama seçeneklerini sıfırla
                setCopyOptions({
                    rooms: true,
                    materials: true,
                    amounts: true,
                    photos: false
                });
                setCopyCount(1);
                setNumberingMode('sequential');
                setCustomNumbers('');
                setStartNumber('');
                
                alert(`✅ ${newApartments.length} adet daire başarıyla kopyalandı!\n\n${newApartments.map(a => a.name).join('\n')}`);
            };
            
            // Toplu daire silme
            const bulkDeleteApartments = () => {

            // Başka daireden miktar kopyalama
            const copyAmountsFromApartment = () => {

                const sourceApt = apartments.find(a => a.id === sourceAptForAmounts);
                const targetApt = getApt();
                
                if (!sourceApt) return;
                
                const updatedData = { ...targetApt.data };
                
                // Her mekan için
                Object.keys(sourceApt.data).forEach(roomId => {
                    if (!updatedData[roomId]) return; // Hedef dairede bu mekan yoksa atla
                    
                    const sourceRoomData = sourceApt.data[roomId];
                    const targetRoomData = updatedData[roomId];
                    
                    // Her alan için
                    Object.keys(sourceRoomData).forEach(field => {
                        if (field === 'foto') return; // Fotoğrafları atla
                        
                        // Alan seçilmemişse atla
                        if (!selectedFieldsForCopy[field]) return;
                        
                        if (field === 'duvar_kaplama') {
                            // Duvar kaplama - TÜM duvarları kopyala
                            if (typeof sourceRoomData[field] === 'object' && sourceRoomData[field] !== null) {
                                // Hedefte duvar_kaplama objesi yoksa oluştur
                                if (!targetRoomData[field] || typeof targetRoomData[field] !== 'object') {
                                    targetRoomData[field] = {};
                                }
                                
                                // Obje formatı (her duvar index ile)
                                Object.keys(sourceRoomData[field]).forEach(wallIdx => {
                                    const sourceWall = sourceRoomData[field][wallIdx];
                                    
                                    // Kaynak duvarda miktar alanı varsa (boş bile olsa) kopyala
                                    if (sourceWall && typeof sourceWall === 'object' && ('miktar' in sourceWall)) {
                                        // Hedefte bu duvar yoksa oluştur
                                        if (!targetRoomData[field][wallIdx]) {
                                            targetRoomData[field][wallIdx] = {};
                                        }
                                        // Miktarı kopyala (boş string veya 0 olsa bile)
                                        targetRoomData[field][wallIdx] = {
                                            ...targetRoomData[field][wallIdx],
                                            miktar: sourceWall.miktar
                                        };
                                    }
                                });
                            }
                        } else if (sourceRoomData[field] && typeof sourceRoomData[field] === 'object') {
                            // Diğer alanlar - hedefte alan yoksa atla
                            if (!targetRoomData[field]) return;
                            
                            // Kaynak alanda miktar alanı varsa kopyala (boş bile olsa)
                            if ('miktar' in sourceRoomData[field]) {
                                targetRoomData[field] = {
                                    ...targetRoomData[field],
                                    miktar: sourceRoomData[field].miktar
                                };
                            }
                        }
                    });
                });
                
                // Güncellenmiş veriyi kaydet
                updateApartments(apartments.map(a => 
                    a.id === currentApt ? { ...a, data: updatedData } : a
                ));
                
                setShowCopyAmountsModal(false);

                setSelectedFieldsForCopy({});

            const getSystemStats = () => {

            const getMaterialUsageAnalysis = () => {
                const analysis = {};
                
                projects.forEach(project => {
                    project.apartments.forEach(apt => {
                        allRooms.forEach(room => {
                            const rd = apt.data[room.id];
                            if (!rd) return;
                            
                            room.fields.forEach(f => {
                                if (f === 'foto') return;
                                const fc = fieldLabels[f];
                                if (!fc) return;
                                
                                if (f === 'duvar_kaplama' && rd[f]) {
                                    const wallCount = apt.wallCount && apt.wallCount[room.id] ? apt.wallCount[room.id] : 1;
                                    for (let wallIdx = 0; wallIdx < wallCount; wallIdx++) {
                                        const v = rd[f][wallIdx];
                                        if (v && v.malzeme) {
                                            const key = `${fc.category}|${v.subgroup || '-'}|${v.malzeme}`;
                                            if (!analysis[key]) {
                                                analysis[key] = {
                                                    category: fc.category,
                                                    subgroup: v.subgroup || '-',
                                                    material: v.malzeme,
                                                    unit: fc.unit || '',
                                                    totalAmount: 0,
                                                    usages: []
                                                };
                                            }
                                            analysis[key].totalAmount += parseFloat(v.miktar || 0);
                                            analysis[key].usages.push({
                                                project: project.name,
                                                apartment: apt.name,
                                                room: room.name,
                                                field: v.name || `Duvar ${wallIdx + 1}`, // Özel duvar ismi veya varsayılan
                                                amount: parseFloat(v.miktar || 0)
                                            });
                                        }
                                    }
                                } else if (rd[f] && rd[f].malzeme) {
                                    const key = `${fc.category}|${rd[f].subgroup || '-'}|${rd[f].malzeme}`;
                                    if (!analysis[key]) {
                                        analysis[key] = {
                                            category: fc.category,
                                            subgroup: rd[f].subgroup || '-',
                                            material: rd[f].malzeme,
                                            unit: fc.unit || '',
                                            totalAmount: 0,
                                            usages: []
                                        };
                                    }
                                    analysis[key].totalAmount += parseFloat(rd[f].miktar || 0);
                                    analysis[key].usages.push({
                                        project: project.name,
                                        apartment: apt.name,
                                        room: room.name,
                                        field: fc.label,
                                        amount: parseFloat(rd[f].miktar || 0)
                                    });
                                }
                            });
                        });
                    });
                });
                
                return Object.values(analysis).sort((a, b) => {
                    if (a.category !== b.category) return a.category.localeCompare(b.category);
                    if (a.subgroup !== b.subgroup) return a.subgroup.localeCompare(b.subgroup);
                    return a.material.localeCompare(b.material);
                });
            };

            const importData = () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        try {
                            const imported = JSON.parse(ev.target.result);
                            if (!imported.projects || !Array.isArray(imported.projects)) {
                                alert('Gecersiz dosya formati!');
                                return;

                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"></path>
                                                </svg>
                                                Malzeme DB
                                            </button>
                                            <button onClick={importMaterialDatabase} className="px-3 py-2 bg-gradient-to-r from-pink-500 to-rose-600 text-white rounded-lg text-sm font-semibold shadow hover:shadow-md hover:from-pink-600 hover:to-rose-700 transition-all flex items-center justify-center gap-1">
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                                                </svg>
                                                Yükle
                                            </button>
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-2">
                                            <button onClick={exportSystemSettings} className="px-3 py-2 bg-gradient-to-r from-emerald-500 to-teal-600 text-white rounded-lg text-sm font-semibold shadow hover:shadow-md hover:from-emerald-600 hover:to-teal-700 transition-all flex items-center justify-center gap-1">
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                                </svg>
                                                Ayarlar
                                            </button>
                                            <button onClick={importSystemSettings} className="px-3 py-2 bg-gradient-to-r from-teal-500 to-cyan-600 text-white rounded-lg text-sm font-semibold shadow hover:shadow-md hover:from-teal-600 hover:to-cyan-700 transition-all flex items-center justify-center gap-1">
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                                                </svg>
                                                Yükle
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="border-t pt-3 mt-3">
                                    <h4 className="text-xs font-bold text-gray-500 mb-3 tracking-wide uppercase">Raporlar</h4>
                                    <div className="flex gap-2 mb-2">
                                        <button onClick={generatePrintForm} className="flex-1 px-4 py-3 bg-gradient-to-r from-red-500 to-rose-600 text-white rounded-lg font-semibold shadow-md hover:shadow-lg hover:from-red-600 hover:to-rose-700 transition-all flex items-center justify-center gap-2">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                        </svg>
                                        Onay Formu
                                    </button>
                                    <button 
                                        onClick={() => setShowPdfColumnSettings(true)}
                                        className="px-3 py-3 bg-gradient-to-r from-orange-500 to-amber-600 text-white rounded-lg font-semibold shadow-md hover:shadow-lg hover:from-orange-600 hover:to-amber-700 transition-all flex items-center justify-center"
                                        title="PDF Sütun Ayarları"
                                    >
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path>
                                        </svg>
                                    </button>
                                </div>
                                    <button onClick={downloadExcel} className="w-full px-4 py-3 bg-gradient-to-r from-green-600 to-emerald-700 text-white rounded-lg font-semibold shadow-md hover:shadow-lg hover:from-green-700 hover:to-emerald-800 transition-all flex items-center justify-center gap-2">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                        </svg>
                                        Excel Raporu
                                    </button>
                                </div>
                                
                                <div className="border-t pt-3 mt-3">
                                    <h4 className="text-xs font-bold text-gray-500 mb-3 tracking-wide uppercase">Ayarlar</h4>
                                    <button onClick={() => setShowDB(true)} className="w-full mb-2 px-4 py-3 bg-gradient-to-r from-purple-500 to-pink-600 text-white rounded-lg font-semibold shadow-md hover:shadow-lg hover:from-purple-600 hover:to-pink-700 transition-all flex items-center justify-center gap-2">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path>
                                        </svg>
                                        Malzeme DB
                                    </button>
                                    <button onClick={() => setShowDefaultSettings(true)} className="w-full mb-2 px-4 py-3 bg-gradient-to-r from-emerald-500 to-teal-600 text-white rounded-lg font-semibold shadow-md hover:shadow-lg hover:from-emerald-600 hover:to-teal-700 transition-all flex items-center justify-center gap-2">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                        </svg>
                                        Sistem Ayarları
                                    </button>
                                    <button onClick={convertAllText} className="w-full px-4 py-3 bg-gradient-to-r from-amber-500 to-orange-600 text-white rounded-lg font-semibold shadow-md hover:shadow-lg hover:from-amber-600 hover:to-orange-700 transition-all flex items-center justify-center gap-2" title="Tüm metinleri 'İlk Harf Büyük diğerleri küçük' formatına çevirir">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"></path>
                                        </svg>
                                        Metin Formatı
                                    </button>
                                </div>
                            </div>
                            
                            <div className="col-span-2">
                                {/* Modern Header */}
                                <div className="bg-gradient-to-r from-blue-600 to-blue-800 rounded-lg shadow-lg p-6 mb-6">
                                    <div className="flex items-center justify-between">
                                        <div className="flex items-center gap-4">
                                            {/* Logo */}
                                            <div className="bg-white rounded-full p-3 shadow-md">
                                                <svg className="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                                                </svg>
                                            </div>
                                            {/* Başlık Bilgileri */}
                                            <div>
                                                <h1 className="text-2xl font-bold text-white">{room ? room.name : ''}</h1>
                                                <p className="text-blue-100 text-sm flex items-center gap-2">
                                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                                                    </svg>
                                                    {getProject().name}
                                                    <span className="mx-2">•</span>
                                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                                                    </svg>
                                                    {getApt().name}
                                                </p>
                                            </div>
                                        </div>
                                        {/* Sağ Taraf: Tarih */}
                                        <div className="flex items-center gap-3">
                                            {/* Tarih Badge */}
                                            <div className="bg-white bg-opacity-20 backdrop-blur-sm rounded-lg px-4 py-2">
                                                <p className="text-white text-xs font-medium">
                                                    {new Date().toLocaleDateString('tr-TR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Veri Giriş Alanları - Kategorilere Göre Gruplandırılmış */}
                                <div className="space-y-6">
                                    {room && (() => {
                                        // room.fields sırasına göre grupla (KULLANICI SİRALAMASI)
                                        const grouped = {};
                                        const fotoField = room.fields.includes('foto') ? 'foto' : null;
                                        
                                        // ÖNEMLİ: room.fields array'inin sırasını koru!
                                        room.fields.filter(f => f !== 'foto').forEach(f => {
                                            const fc = fieldLabels[f];
                                            if (!fc) return;
                                            
                                            const category = fc.category || 'Diğer';
                                            if (!grouped[category]) grouped[category] = [];
                                            grouped[category].push(f);
                                        });
                                        
                                        // Her kategorideki field'ları room.fields sırasına göre sırala
                                        Object.keys(grouped).forEach(cat => {
                                            grouped[cat].sort((a, b) => {
                                                return room.fields.indexOf(a) - room.fields.indexOf(b);
                                            });
                                        });
                                        
                                        // Kategorileri de room.fields'da ilk görünme sırasına göre al
                                        const categoryFirstAppearance = {};
                                        room.fields.forEach((fieldKey, idx) => {
                                            const fc = fieldLabels[fieldKey];
                                            if (!fc) return;
                                            const cat = fc.category || 'Diğer';
                                            if (categoryFirstAppearance[cat] === undefined) {
                                                categoryFirstAppearance[cat] = idx;
                                            }
                                        });
                                        
                                        const sortedCategories = Object.keys(grouped).sort((a, b) => {
                                            return categoryFirstAppearance[a] - categoryFirstAppearance[b];
                                        });
                                        
                                        return (
                                            <>
                                                {sortedCategories.map(category => (
                                                    <div key={category}>
                                                        {/* Kategori Başlığı */}
                                                        <div className="mb-4">
                                                            <div className={`flex items-center gap-2 px-4 py-2.5 rounded-lg ${
                                                                theme === 'dark'
                                                                    ? 'bg-gradient-to-r from-blue-600 to-purple-700'
                                                                    : 'bg-gradient-to-r from-blue-500 to-purple-600'
                                                            }`}>
                                                                <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                                                                </svg>
                                                                <h3 className="text-white font-bold text-lg">
                                                                    {category}
                                                                </h3>
                                                                <span className="ml-auto text-white text-sm bg-white bg-opacity-20 px-2.5 py-0.5 rounded-full">
                                                                    {grouped[category].length} Alan
                                                                </span>
                                                            </div>
                                                        </div>
                                                        
                                                        {/* Kategorideki Alanlar */}
                                                        <div className="mb-6">
                                                            {grouped[category].map((f, idx) => (
                                                                <div 
                                                                    key={f}
                                                                    className={idx > 0 ? 'mt-3' : ''}
                                                                >
                                                                    {renderField(f)}
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                ))}
                                                
                                                {/* Foto alanını her zaman en sona ekle */}
                                                {fotoField && (
                                                    <div>
                                                        <div className="mb-4">
                                                            <div className={`flex items-center gap-2 px-4 py-2.5 rounded-lg ${
                                                                theme === 'dark'
                                                                    ? 'bg-gradient-to-r from-purple-600 to-pink-700'
                                                                    : 'bg-gradient-to-r from-purple-500 to-pink-600'
                                                            }`}>
                                                                <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                                                                </svg>
                                                                <h3 className="text-white font-bold text-lg">
                                                                    Fotoğraflar
                                                                </h3>
                                                            </div>
                                                        </div>
                                                        {renderField(fotoField)}
                                                    </div>
                                                )}
                                            </>
                                        );
                                    })()}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
